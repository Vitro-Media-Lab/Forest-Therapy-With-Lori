<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Therapy with Lori | Reiki & Nature Alchemy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #050806;       /* Almost black */
            --fern-dark: #0f1c13;     /* Deep forest shadow */
            --moss: #2b422a;          /* Rich green */
            --alchemy-gold: #c5a059;  /* Muted, antique gold */
            --text-light: #e0e5e2;    /* Soft off-white */
            --text-muted: #8a9c90;    /* Muted sage green */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-void);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- SACRED GEOMETRY OVERLAYS --- */
        .geometry-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Subtle geometric diamond/flower of life pattern overlay */
            background-image: 
                linear-gradient(30deg, var(--alchemy-gold) 12%, transparent 12.5%, transparent 87%, var(--alchemy-gold) 87.5%, var(--alchemy-gold)),
                linear-gradient(150deg, var(--alchemy-gold) 12%, transparent 12.5%, transparent 87%, var(--alchemy-gold) 87.5%, var(--alchemy-gold)),
                linear-gradient(30deg, var(--alchemy-gold) 12%, transparent 12.5%, transparent 87%, var(--alchemy-gold) 87.5%, var(--alchemy-gold)),
                linear-gradient(150deg, var(--alchemy-gold) 12%, transparent 12.5%, transparent 87%, var(--alchemy-gold) 87.5%, var(--alchemy-gold)),
                linear-gradient(60deg, rgba(197, 160, 89, 0.05) 25%, transparent 25.5%, transparent 75%, rgba(197, 160, 89, 0.05) 75%, rgba(197, 160, 89, 0.05)), 
                linear-gradient(60deg, rgba(197, 160, 89, 0.05) 25%, transparent 25.5%, transparent 75%, rgba(197, 160, 89, 0.05) 75%, rgba(197, 160, 89, 0.05));
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
            opacity: 0.03; /* Extremely subtle */
            pointer-events: none;
            z-index: 1;
        }

        /* --- NAVIGATION --- */
        header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: var(--alchemy-gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-symbol {
            font-size: 30px;
            line-height: 1;
            font-weight: 300;
        }

        nav ul { display: flex; list-style: none; gap: 40px; }
        nav a { 
            color: var(--text-light); 
            text-decoration: none; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: color 0.4s;
        }
        nav a:hover { color: var(--alchemy-gold); }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5%;
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Deep, dark misty ferns */
            background: url('bg.jpg') center/cover;
            z-index: 0;
            filter: brightness(0.4) saturate(0.8);
        }

        .hero-vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-void) 90%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
            margin-top: 50px;
        }

        .alchemical-element {
            color: var(--alchemy-gold);
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 15px;
            opacity: 0.8;
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 6vw, 5rem);
            color: var(--text-light);
            line-height: 1.1;
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .hero h1 span {
            color: var(--alchemy-gold);
            font-style: italic;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
        }

        .cta-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-gold {
            background: transparent;
            border: 1px solid var(--alchemy-gold);
            color: var(--alchemy-gold);
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-gold:hover {
            background: var(--alchemy-gold);
            color: var(--bg-void);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
        }

        /* --- THE 80/20 SYNERGY SECTION --- */
        .synergy-section {
            position: relative;
            padding: 100px 5%;
            background: var(--fern-dark);
            z-index: 2;
            border-top: 1px solid rgba(197, 160, 89, 0.2);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        /* Left Side: The Forest (80%) */
        .forest-column {
            position: relative;
        }
        
        .forest-column h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--alchemy-gold);
            margin-bottom: 20px;
            font-weight: 400;
        }

        .forest-column p {
            font-weight: 300;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        /* Right Side: The Reiki Owl/Alchemy (20%) */
        .reiki-column {
            position: relative;
            border: 1px solid rgba(197, 160, 89, 0.15); /* Softened the main border to let the corners pop */
            padding: 40px;
            background: var(--bg-void);
            text-align: center;
        }

        /* Organic Leaf/Petal Corners */
        .fern-corner {
            position: absolute;
            width: 28px;
            height: 28px;
            border: 1.5px solid var(--alchemy-gold);
            opacity: 0.8;
            pointer-events: none;
        }
        
        .corner-tl {
            top: -12px; left: -12px;
            border-radius: 25px 0 25px 0; /* Creates an organic, swooping leaf edge */
            border-right: none;
            border-bottom: none;
        }
        
        .corner-tr {
            top: -12px; right: -12px;
            border-radius: 0 25px 0 25px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-bl {
            bottom: -12px; left: -12px;
            border-radius: 0 25px 0 25px;
            border-right: none;
            border-top: none;
        }
        
        .corner-br {
            bottom: -12px; right: -12px;
            border-radius: 25px 0 25px 0;
            border-left: none;
            border-top: none;
        }

        .owl-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--alchemy-gold);
            margin: 0 auto 20px;
            filter: grayscale(100%) sepia(30%) hue-rotate(60deg); /* Gives a golden/green antique tint */
        }

        .reiki-column h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--text-light);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .reiki-column p {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        @media (max-width: 900px) {
            .synergy-section { grid-template-columns: 1fr; }
            nav ul { display: none; } /* Mobile menu needed */
            .cta-group { flex-direction: column; }
        }
    </style>
</head>
